<div class="container">
    <h2>Explain Code</h2>
    <textarea rows="8" [(ngModel)]="code" placeholder="Paste you code here"></textarea>

    <br/> <br/>

    <select [(ngModel)]="selectedProvider" class="form-control">
        <option *ngFor="let provider of providers" [value]="provider.value">{{provider.label}}</option>
    </select>

    <br/> <br/>

    <button (click)="explain()" [disabled]="loading">{{loading ? 'Loading...' : 'Explain Code'}}
    </button>

    <div *ngIf="loading" class="loader-container">
        <div class="spinner"></div>

        <div class="loading-text">Loading AI Response...</div>
    </div>

    <br/> <br/>

    <div *ngIf="error" class="error-box">{{error}}</div>

    <div class="result-box" *ngIf="result">
        <!-- <pre>{{result}}</pre> -->
         <div [innerHTML]="result"></div>
    </div>

</div>
